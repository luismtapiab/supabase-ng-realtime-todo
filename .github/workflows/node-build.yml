name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        # Setting base-href to /supabase-ng-realtime-todo/ to match GitHub Pages subdirectory
        run: npm run build -- --configuration production --base-href=/supabase-ng-realtime-todo/
        env:
          NG_APP_API_URL: ${{ secrets.NG_APP_API_URL }}
          NG_APP_ANON_KEY: ${{ secrets.NG_APP_ANON_KEY }}

      - name: Fix 404 for SPA
        # Copy index.html to 404.html so GitHub Pages handles SPA routes
        run: cp docs/index.html docs/404.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
