<div class="container">
  <main class="side-panel-container" [class.hide-panel]="!isPanelVisible()">
    <app-todo-list></app-todo-list>
    
    <div class="sidebar">
      <app-lateral-panel (close)="togglePanel()"></app-lateral-panel>
    </div>

    @if (!isPanelVisible()) {
      <button class="show-logs-btn" (click)="togglePanel()">
        <span class="icon">📋</span> Logs
      </button>
    }
  </main>
</div>
