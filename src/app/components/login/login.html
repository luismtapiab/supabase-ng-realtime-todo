<main class="container">
  <article>
    <header>
      <div class="header">
        <hgroup>
          <h1>Todo <span>Realtime</span></h1>
          <p>{{ isRegistering ? 'Create your account to start' : 'Welcome back! Select your user or enter your username'
            }}</p>
        </hgroup>
      </div>
    </header>

    <div class="user-selection" *ngIf="!isRegistering && registeredUsers().length > 0">
      <div class="user-chips">
        <button type="button" *ngFor="let user of registeredUsers()" class="outline contrast user-chip"
          (click)="selectUser(user.username)" [disabled]="loading()">
          {{ user.username }}
        </button>
      </div>
      <div class="divider">
        <span>OR</span>
      </div>
    </div>

    <form (submit)="onSubmit(); $event.preventDefault()">
      <label for="username">
        Username
        <input type="text" id="username" name="username" [(ngModel)]="username" placeholder="e.g. johndoe"
          [disabled]="loading()" required autocomplete="username">
      </label>

      <div class="error-msg" *ngIf="error()">
        {{ error() }}
      </div>

      <button type="submit" [aria-busy]="loading()" [disabled]="loading() || !username.trim()">
        {{ isRegistering ? 'Register & Start' : 'Sign In' }}
      </button>
    </form>

    <footer>
      <p>
        {{ isRegistering ? 'Already have an account?' : 'New here?' }}
        <a (click)="toggleMode()" class="secondary">{{ isRegistering ? 'Login' : 'Create account' }}</a>
      </p>
    </footer>
  </article>
</main>
