<div class="panel">
    <div class="header">
        <h3>Activity Log</h3> 
        <div class="header-actions">
            <button (click)="logs.next([])">Clear</button>
            <button class="close-btn" (click)="close.emit()">×</button>
        </div>
    </div>
    <div class="logs">

        @if(logs | async; as logscontent) {
        @for(log of logscontent; track $index) {
        <div class="log-item">
            {{ log }}
        </div>
        }
        }
        @else {
        <div class="empty-state">
            No activity yet...
        </div>
        }
    </div>
</div>
